# Mechanized abstract-model obligations.
#
# These records deliberately do not claim source-level conformance. They bind
# requirement/scenario ledger entries to named Quint/Apalache actions and
# invariants so model drift is caught by the checkers.

[[formal_model]]
id = "serde-doc-null-schema-deserialize-installs"
tool = "quint_apalache"
kind = "invariant"
model_path = "quint/serde_api.qnt"
runner_path = "quint/run.sh"
module = "SqliteSerdeApi"
init = "initDoc"
step = "step"
invariants = ["successfulDeserializeInstalls"]
requirement_ids = ["SQLITE-CAPI-DESERIALIZE-NULL-SCHEMA-MAIN"]
scenario_ids = ["SERDE-DESERIALIZE-NULL-SCHEMA-MAIN"]
divergence_cases = []

